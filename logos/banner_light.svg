<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="12" fill="#ffffff"/>
  <rect width="900" height="260" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Logo: Overlapping Circles -->
  <g transform="translate(50, 30)">
    <circle cx="100" cy="100" r="94" fill="#3D3D3D"/>

    <!-- Three overlapping circles — all same color, 2x thick -->
    <circle cx="82" cy="82" r="36" fill="none" stroke="#EDAA1E" stroke-width="6"/>
    <circle cx="118" cy="82" r="36" fill="none" stroke="#EDAA1E" stroke-width="6"/>
    <circle cx="100" cy="114" r="36" fill="none" stroke="#EDAA1E" stroke-width="6"/>

    <!-- Outer ring — same color, 2x thick -->
    <circle cx="100" cy="100" r="94" stroke="#EDAA1E" stroke-width="4" fill="none"/>
  </g>

  <!-- Project name -->
  <text x="290" y="80" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="40" fill="#1a1a1a" letter-spacing="1">NukeMCP</text>

  <!-- Tagline -->
  <text x="290" y="140" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="28" fill="#EDAA1E">Talk to Nuke.</text>

  <!-- Subtitle -->
  <text x="290" y="185" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="300" font-size="20" fill="#555555">Every Node. Every Knob. One Conversation.</text>

  <!-- Accent line -->
  <rect x="290" y="210" width="120" height="2" rx="1" fill="#EDAA1E" opacity="0.6"/>
</svg>
